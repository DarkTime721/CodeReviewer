volumes:
    chroma_data:
    ollama_data:
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_DB_PATH=/app/chroma
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma
    
  ollama:
    image: ollama/ollama
    env_file:
      - .env
    environment:
      - LLM_PROVIDER
      - OLLAMA_CLASSIFIER
      - OLLAMA_JUDGE_MODEL
      - OLLAMA_SPECIALIST_MODEL
      - OLLAMA_DEFAULT_MODEL
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: []
    entrypoint: sh -c "chmod +x /ollama-entrypoint.sh && /ollama-entrypoint.sh"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    